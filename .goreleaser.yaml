# GoReleaser turns one tag push into everything a user might install from: raw
# archives, Linux packages (deb, rpm, apk), a multi-arch container image, and
# entries for the package managers (Homebrew, Scoop). `git tag vX.Y.Z && git
# push --tags` fans out to all of them through .github/workflows/release.yml.
#
# Publish steps that push to a repository we do not own yet (the Homebrew tap,
# the Scoop bucket) self-disable when their token is absent. A release with no
# extra secrets still produces every downloadable artifact and the container
# image; each manager lights up the moment its repository and token exist.
version: 2

project_name: unagi

before:
  # Only fetch modules; never `go mod tidy` during a release, the tree is kept
  # tidy in CI.
  hooks:
    - go mod download

builds:
  # One build. unagi is pure Go (no cgo anywhere on the compile path), so a
  # single CGO_ENABLED=0 build cross-compiles cleanly to every target below
  # with no per-OS toolchain.
  - id: unagi
    binary: unagi
    main: ./cmd/unagi
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tamnd/unagi/pkg/cli.Version={{ .Version }}
      - -X github.com/tamnd/unagi/pkg/cli.Commit={{ .ShortCommit }}
      - -X github.com/tamnd/unagi/pkg/cli.Date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    targets:
      - linux_amd64
      - linux_arm64
      - linux_arm_7
      - linux_386
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
      - windows_arm64
      - freebsd_amd64
      - freebsd_arm64

archives:
  # tar.gz everywhere except a zip on Windows. This is the archive every package
  # manager installs.
  - id: default
    ids:
      - unagi
    name_template: "unagi_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

nfpms:
  # One nfpm definition emits the deb, rpm, and apk for every Linux build.
  # unagi is a user command, not a daemon, so there is no unit file and no
  # postinstall: the package is the binary and its license. No runtime
  # dependencies; the compiled output needs a Go toolchain, but the package
  # does not force one on the host.
  - id: linux-packages
    package_name: unagi
    ids:
      - unagi
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: tamnd
    homepage: https://github.com/tamnd/unagi
    maintainer: Duc-Tam Nguyen <tamnd87@gmail.com>
    description: A Python to Go compiler
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/unagi/LICENSE

dockers_v2:
  # One multi-platform image built with buildx. GoReleaser stages the prebuilt
  # binaries under per-platform directories in the build context and the
  # Dockerfile copies the right one through $TARGETPLATFORM.
  - images:
      - ghcr.io/tamnd/unagi
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "A Python to Go compiler"
      org.opencontainers.image.url: "https://github.com/tamnd/unagi"
      org.opencontainers.image.source: "https://github.com/tamnd/unagi"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.licenses: "MIT"

homebrew_casks:
  # Homebrew cask pushed to the tap repository. Self-disables until
  # HOMEBREW_TAP_GITHUB_TOKEN (a PAT with write to tamnd/homebrew-tap) is set,
  # so a tokenless release still writes the cask into dist for inspection.
  - name: unagi
    ids:
      - default
    repository:
      owner: tamnd
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/tamnd/unagi
    description: A Python to Go compiler
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

scoops:
  # Scoop manifest for Windows, pushed to the bucket repository. Self-disables
  # until SCOOP_BUCKET_GITHUB_TOKEN is set, same as the Homebrew cask above.
  - ids:
      - default
    repository:
      owner: tamnd
      name: scoop-bucket
      token: '{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}'
    directory: bucket
    homepage: https://github.com/tamnd/unagi
    description: A Python to Go compiler
    license: MIT
    skip_upload: '{{ if index .Env "SCOOP_BUCKET_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  # A CycloneDX SBOM per archive via syft; the release workflow installs it.
  - id: archive
    artifacts: archive

signs:
  # Keyless cosign signature over the checksum file. It runs only on a real
  # release in CI, where the workflow grants the OIDC token cosign needs.
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    artifacts: manifests
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: tamnd
    name: unagi
  draft: false
  prerelease: auto
